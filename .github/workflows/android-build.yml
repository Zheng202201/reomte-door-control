name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace --info

      - name: Read app version
        id: version
        working-directory: android
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed -E 's/.*= *([0-9]+).*/\1/')
          APK_NAME="remote-door-v${VERSION_NAME}-b${VERSION_CODE}-debug.apk"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "APK will be named: ${APK_NAME}"

      - name: Rename APK with version
        run: |
          cp "android/app/build/outputs/apk/debug/app-debug.apk" \
             "android/app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-door-v${{ steps.version.outputs.version_name }}-b${{ steps.version.outputs.version_code }}
          path: android/app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      - name: Upload APK to Release (manual tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
